<!DOCTYPE html>
<div class="game-container">
    <div class="game-header"><button class="btn btn-icon" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button><h3>Typing Race</h3><span id="typeScore">Score: 0</span></div>
    <div class="type-display" id="typeDisplay"></div>
    <input type="text" class="form-input type-input" id="typeInput" placeholder="Type here..." autofocus>
    <p class="text-center text-muted text-sm mt-2">Type the word and press Enter</p>
</div>
<style>.game-container{text-align:center;max-width:500px;margin:0 auto;}.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);}.type-display{font-size:2rem;font-weight:var(--font-bold);color:var(--primary-400);margin:var(--space-6)0;min-height:60px;}.type-input{text-align:center;font-size:1.2rem;}</style>
