<!DOCTYPE html>
<div class="game-container">
    <div class="game-header"><button class="btn btn-icon" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button><h3>2048</h3><span id="score2048">Score: 0</span></div>
    <div class="grid-2048" id="grid2048"></div>
    <button class="btn btn-secondary btn-sm mt-4" id="reset2048">Reset</button>
</div>
<style>.game-container{text-align:center;max-width:400px;margin:0 auto;}.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);}.grid-2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--bg-hover);padding:8px;border-radius:var(--radius-lg);}.cell-2048{aspect-ratio:1;background:var(--bg-card);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:var(--font-bold);font-size:1.5rem;transition:all 0.15s ease;}.cell-2{background:#eee4da;color:#776e65;}.cell-4{background:#ede0c8;color:#776e65;}.cell-8{background:#f2b179;color:white;}.cell-16{background:#f59563;color:white;}.cell-32{background:#f67c5f;color:white;}.cell-64{background:#f65e3b;color:white;}.cell-128{background:#edcf72;color:white;font-size:1.2rem;}.cell-256{background:#edcc61;color:white;font-size:1.2rem;}.cell-512{background:#edc850;color:white;font-size:1.2rem;}.cell-1024{background:#edc53f;color:white;font-size:1rem;}.cell-2048{background:#edc22e;color:white;font-size:1rem;}</style>
