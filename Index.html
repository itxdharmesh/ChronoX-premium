<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoX - Premium Social Network</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/games.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChronoX">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/144/spider.png">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen">
        <div class="splash-logo">🕷️</div>
        <div class="splash-brand">ChronoX</div>
        <div class="splash-loader"></div>
    </div>

    <!-- Auth Container -->
    <div id="authContainer"></div>

    <!-- Main App -->
    <div id="mainApp">
        <div id="contentArea"></div>
        <nav id="bottomNav">
            <button class="nav-btn active" data-page="home">🏠<span>Home</span></button>
            <button class="nav-btn" data-page="chats">💬<span>Chats</span></button>
            <button class="nav-btn" data-page="discover">🔍<span>Discover</span></button>
            <button class="nav-btn" data-page="quiz">❓<span>Quiz</span></button>
            <button class="nav-btn" data-page="games">🎮<span>Games</span></button>
            <button class="nav-btn" data-page="profile">👤<span>Profile</span></button>
        </nav>
    </div>

    <!-- Chat Window -->
    <div id="chatWindow">
        <div id="chatHeader">
            <button onclick="closeChat()">←</button>
            <img id="chatAvatar" src="" alt="">
            <div>
                <div id="chatName"></div>
                <div id="chatStatus"></div>
            </div>
            <div id="chatActions">
                <label for="mediaUpload" class="chat-action-btn">📎</label>
                <input type="file" id="mediaUpload" accept="image/*,video/*" multiple hidden onchange="sendMedia()">
            </div>
        </div>
        <div id="chatMessages"></div>
        <div id="chatInputArea">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- User Profile Modal -->
    <div id="userProfileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button onclick="closeModal('userProfileModal')">←</button>
                <h2>Profile</h2>
                <button class="three-dots-btn" onclick="showUserOptions()">⋮</button>
            </div>
            <div id="userProfileContent"></div>
        </div>
    </div>

    <!-- User Options Dropdown -->
    <div id="userOptionsDropdown" class="dropdown">
        <button onclick="aboutAccount()">ℹ️ About Account</button>
        <button onclick="reportUser()">🚩 Report</button>
        <button onclick="blockUser()">🚫 Block</button>
    </div>

    <!-- Games Modal -->
    <div id="gamesModal" class="modal">
        <div class="modal-content" id="gamesContent"></div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="modal">
        <div class="modal-content" id="quizContent"></div>
    </div>

    <!-- Generic Modal -->
    <div id="genericModal" class="modal">
        <div class="modal-content" id="genericModalContent"></div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/search.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/ai/annaya.js"></script>
    <script src="js/ai/tarun.js"></script>
    <script src="js/ai/chronox-ai.js"></script>
    <script src="js/games/tictactoe.js"></script>
    <script src="js/games/memory.js"></script>
    <script src="js/games/quiz.js"></script>
    <script src="js/games/snake-ladder.js"></script>
    <script src="js/games/uno.js"></script>
    <script src="js/games/ludo.js"></script>
    <script src="js/games/games-main.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/moderation.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('✅ SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
