<!DOCTYPE html>
<!-- ChronoX - Profile Page -->
<div class="profile-page">
    <!-- Profile Banner -->
    <div class="profile-banner" id="profileBanner">
        <img src="assets/backgrounds/default-banner.png" alt="Profile Banner" id="bannerImage">
        <button class="change-banner-btn" id="changeBannerBtn" title="Change Banner">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </button>
    </div>

    <!-- Profile Info -->
    <div class="profile-info">
        <div class="profile-info-container">
            <!-- Avatar -->
            <div class="profile-avatar-wrapper">
                <img src="assets/avatars/default.png" alt="Avatar" class="avatar avatar-xl" id="profileAvatar">
                <button class="change-avatar-btn" id="changeAvatarBtn" title="Change Avatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>

            <!-- User Details -->
            <div class="profile-details">
                <div class="profile-name-row">
                    <h1 class="profile-display-name" id="profileDisplayName">User Name</h1>
                    <span class="badge badge-verified" id="verifiedBadge" style="display:none;">✓</span>
                </div>
                <p class="profile-username" id="profileUsername">@username</p>
                <p class="profile-bio" id="profileBio">No bio yet</p>
                
                <!-- Badges -->
                <div class="profile-badges" id="profileBadges">
                    <span class="badge badge-xp">🌟 Level 1</span>
                    <span class="badge badge-coins">💰 0 Coins</span>
                </div>

                <!-- Stats -->
                <div class="profile-stats">
                    <div class="profile-stat">
                        <span class="stat-value" id="profilePosts">0</span>
                        <span class="stat-label">Posts</span>
                    </div>
                    <div class="profile-stat">
                        <span class="stat-value" id="profileFollowers">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="profile-stat">
                        <span class="stat-value" id="profileFollowing">0</span>
                        <span class="stat-label">Following</span>
                    </div>
                    <div class="profile-stat">
                        <span class="stat-value" id="profileFriends">0</span>
                        <span class="stat-label">Friends</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="profile-actions" id="profileActions">
                <button class="btn btn-primary" id="editProfileBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Edit Profile
                </button>
                <button class="btn btn-secondary" id="followBtn" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    Follow
                </button>
                <button class="btn btn-secondary" id="messageBtn" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Message
                </button>
            </div>
        </div>
    </div>

    <!-- Profile Tabs -->
    <div class="profile-tabs">
        <button class="profile-tab active" data-tab="posts">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Posts
        </button>
        <button class="profile-tab" data-tab="achievements">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="7"/>
                <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
            </svg>
            Achievements
        </button>
        <button class="profile-tab" data-tab="games">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="20" height="12" rx="2"/>
                <path d="M12 12h.01"/>
            </svg>
            Games
        </button>
    </div>

    <!-- Tab Content -->
    <div class="profile-tab-content" id="profileTabContent">
        <!-- Posts Grid -->
        <div class="profile-posts-grid" id="profilePostsGrid">
            <!-- Posts loaded dynamically -->
        </div>

        <!-- Achievements Grid (Hidden) -->
        <div class="profile-achievements-grid" id="profileAchievementsGrid" style="display:none;">
            <!-- Achievements loaded dynamically -->
        </div>

        <!-- Games Stats (Hidden) -->
        <div class="profile-games-stats" id="profileGamesStats" style="display:none;">
            <!-- Game stats loaded dynamically -->
        </div>
    </div>
  </div>
