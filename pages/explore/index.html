<!DOCTYPE html>
<!-- ChronoX - Explore Page -->
<div class="explore-page">
    <!-- Header -->
    <div class="explore-header">
        <h2>Explore</h2>
        <p class="text-muted">Discover trending content and communities</p>
    </div>

    <!-- Trending Tags -->
    <div class="explore-section">
        <h3 class="explore-section-title">Trending Tags</h3>
        <div class="trending-tags" id="trendingTags">
            <span class="trending-tag">#gaming</span>
            <span class="trending-tag">#achievement</span>
            <span class="trending-tag">#chronox</span>
            <span class="trending-tag">#community</span>
            <span class="trending-tag">#levelup</span>
            <span class="trending-tag">#rewards</span>
            <span class="trending-tag">#friends</span>
            <span class="trending-tag">#fun</span>
        </div>
    </div>

    <!-- Trending Posts Grid -->
    <div class="explore-section">
        <h3 class="explore-section-title">Trending Posts</h3>
        <div class="explore-grid" id="exploreGrid">
            <!-- Posts loaded dynamically -->
        </div>
    </div>

    <!-- Suggested Users -->
    <div class="explore-section">
        <h3 class="explore-section-title">Suggested Users</h3>
        <div class="suggested-users" id="suggestedUsers">
            <!-- Users loaded dynamically -->
        </div>
    </div>

    <!-- Popular Communities -->
    <div class="explore-section">
        <h3 class="explore-section-title">Popular Communities</h3>
        <div class="communities-grid" id="exploreCommunities">
            <!-- Communities loaded dynamically -->
        </div>
    </div>
</div>
