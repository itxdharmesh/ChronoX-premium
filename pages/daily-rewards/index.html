<!DOCTYPE html>
<!-- ChronoX - Daily Rewards Page -->
<div class="daily-rewards-page">
    <div class="rewards-header">
        <h2>Daily Rewards</h2>
        <p class="text-muted">Login every day to claim rewards!</p>
    </div>

    <!-- Streak Info -->
    <div class="streak-card glass" id="streakCard">
        <div class="streak-fire">🔥</div>
        <div class="streak-count" id="streakCount">0</div>
        <div class="streak-label">Day Streak</div>
        <div class="streak-bonus" id="streakBonus">+10 bonus coins per day</div>
    </div>

    <!-- Weekly Calendar -->
    <div class="weekly-rewards">
        <h3>This Week</h3>
        <div class="week-grid" id="weekGrid"></div>
    </div>

    <!-- Claim Button -->
    <div class="claim-section">
        <button class="btn btn-primary btn-lg btn-block" id="claimRewardBtn">
            <span>🎁 Claim Daily Reward</span>
        </button>
        <p class="text-muted text-sm text-center mt-2" id="nextClaimTime"></p>
    </div>
</div>
