<!DOCTYPE html>
<!-- ChronoX - Single Post View -->
<div class="post-view-page">
    <button class="btn btn-icon mb-4" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="post-detail-card glass" id="postDetail"></div>
    <div class="comments-section" id="commentsSection">
        <h4>Comments</h4>
        <div class="comment-form">
            <input type="text" class="form-input" id="commentInput" placeholder="Write a comment...">
            <button class="btn btn-primary btn-sm" id="submitComment">Post</button>
        </div>
        <div class="comments-list" id="commentsList"></div>
    </div>
</div>
