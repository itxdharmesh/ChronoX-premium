<!DOCTYPE html>
<!-- ChronoX - Search Page -->
<div class="search-page">
    <div class="search-header">
        <div class="search-input-wrapper glass">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" class="search-main-input" id="searchMainInput" placeholder="Search users, posts, communities..." autofocus>
        </div>
    </div>
    <div class="search-tabs">
        <button class="search-tab active" data-tab="all">All</button>
        <button class="search-tab" data-tab="users">Users</button>
        <button class="search-tab" data-tab="posts">Posts</button>
        <button class="search-tab" data-tab="communities">Communities</button>
    </div>
    <div class="search-results" id="searchResults">
        <p class="text-center text-muted py-8">Start typing to search...</p>
    </div>
</div>
