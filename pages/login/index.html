<!DOCTYPE html>
<!-- ChronoX - Login Page -->
<div class="auth-page">
    <div class="auth-container">
        <!-- Left Side - Branding -->
        <div class="auth-branding">
            <div class="auth-logo">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <defs>
                        <linearGradient id="authLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6c5ce7"/>
                            <stop offset="100%" style="stop-color:#a55eea"/>
                        </linearGradient>
                    </defs>
                    <circle cx="40" cy="40" r="36" fill="url(#authLogoGrad)" opacity="0.2"/>
                    <polygon points="40,14 54,38 26,38" fill="url(#authLogoGrad)"/>
                    <circle cx="40" cy="30" r="6" fill="white"/>
                    <text x="40" y="65" text-anchor="middle" fill="var(--text-primary)" font-size="16" font-weight="bold">X</text>
                </svg>
                <h1 class="auth-brand-name">Chrono<span class="text-primary">X</span></h1>
            </div>
            <p class="auth-tagline">Connect, Play, Earn Rewards</p>
            <div class="auth-features">
                <div class="auth-feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Connect with friends</span>
                </div>
                <div class="auth-feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                        <path d="M12 12h.01"/>
                    </svg>
                    <span>Play mini games</span>
                </div>
                <div class="auth-feature">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="7"/>
                        <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
                    </svg>
                    <span>Earn achievements</span>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper glass">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Login to your account</p>

                <form class="auth-form" id="loginForm" novalidate>
                    <!-- Email/Username -->
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Email or Username</label>
                        <div class="input-group">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input 
                                type="text" 
                                id="loginEmail" 
                                class="form-input" 
                                placeholder="Enter email or username"
                                required
                                autocomplete="username"
                            >
                        </div>
                        <span class="form-error" id="loginEmailError"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <div class="input-group">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                id="loginPassword" 
                                class="form-input" 
                                placeholder="Enter password"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span class="form-error" id="loginPasswordError"></span>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" class="checkbox-input">
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-text">Remember me</span>
                        </label>
                        <a href="#/forgot-password" class="forgot-link">Forgot Password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader" style="display:none;">
                            <span class="btn-spinner"></span>
                            Logging in...
                        </span>
                    </button>

                    <!-- Demo Login -->
                    <button type="button" class="btn btn-secondary btn-block mt-4" id="demoLoginBtn">
                        Try Demo Account
                    </button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>or</span>
                </div>

                <!-- Signup Link -->
                <p class="auth-switch">
                    Don't have an account? 
                    <a href="#/signup" class="auth-link">Create Account</a>
                </p>
            </div>
        </div>
    </div>
</div>
