<!DOCTYPE html>
<!-- ChronoX - Events Page -->
<div class="events-page">
    <div class="events-header">
        <h2>Events</h2>
        <p class="text-muted">Participate in events and win prizes</p>
    </div>

    <!-- Active Events -->
    <div class="events-section">
        <h3>Active Events</h3>
        <div class="events-grid" id="activeEvents"></div>
    </div>

    <!-- Upcoming Events -->
    <div class="events-section">
        <h3>Upcoming Events</h3>
        <div class="events-list" id="upcomingEvents"></div>
    </div>

    <!-- Past Events -->
    <div class="events-section">
        <h3>Past Events</h3>
        <div class="events-list" id="pastEvents"></div>
    </div>
</div>
