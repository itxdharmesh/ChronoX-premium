<!DOCTYPE html>
<!-- ChronoX - XP & Levels Page -->
<div class="xp-page">
    <div class="xp-header">
        <h2>XP & Levels</h2>
    </div>

    <!-- Level Card -->
    <div class="level-card glass">
        <div class="level-badge" id="levelBadge">1</div>
        <h3>Level <span id="currentLevel">1</span></h3>
        <div class="xp-bar-container">
            <div class="xp-bar-fill" id="xpBarFill"></div>
        </div>
        <div class="xp-text">
            <span id="currentXP">0</span> / <span id="nextLevelXP">1000</span> XP
        </div>
        <p class="text-muted text-sm mt-2" id="xpRemaining">1000 XP to next level</p>
    </div>

    <!-- Rewards Path -->
    <div class="rewards-section">
        <h3>Level Rewards</h3>
        <div class="rewards-timeline" id="rewardsTimeline"></div>
    </div>

    <!-- XP Sources -->
    <div class="xp-sources">
        <h3>How to Earn XP</h3>
        <div class="xp-source-list">
            <div class="xp-source-item">
                <span>📝 Create Post</span><span class="text-success">+10 XP</span>
            </div>
            <div class="xp-source-item">
                <span>💬 Comment</span><span class="text-success">+5 XP</span>
            </div>
            <div class="xp-source-item">
                <span>❤️ Get Likes</span><span class="text-success">+2 XP</span>
            </div>
            <div class="xp-source-item">
                <span>🎮 Play Games</span><span class="text-success">+25 XP</span>
            </div>
            <div class="xp-source-item">
                <span>🔥 Daily Login</span><span class="text-success">+15 XP</span>
            </div>
            <div class="xp-source-item">
                <span>🏆 Achievements</span><span class="text-success">+50-500 XP</span>
            </div>
        </div>
    </div>
</div>
