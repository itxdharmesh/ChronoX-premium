<!DOCTYPE html>
<!-- ChronoX - Forgot Password Page -->
<div class="auth-page">
    <div class="auth-container auth-container-sm">
        <div class="auth-form-wrapper glass">
            <!-- Back Button -->
            <a href="#/login" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                Back to Login
            </a>

            <!-- Lock Icon -->
            <div class="auth-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <circle cx="12" cy="16" r="1"/>
                </svg>
            </div>

            <h2 class="auth-title">Forgot Password?</h2>
            <p class="auth-subtitle">
                Don't worry! Enter your email address and we'll send you a link to reset your password.
            </p>

            <!-- Step 1: Email Form -->
            <form class="auth-form" id="forgotForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="forgotEmail">Email Address</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input 
                            type="email" 
                            id="forgotEmail" 
                            class="form-input" 
                            placeholder="Enter your email"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <span class="form-error" id="forgotEmailError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="btn-spinner"></span>
                        Sending...
                    </span>
                </button>
            </form>

            <!-- Step 2: Success Message (Hidden by default) -->
            <div class="success-message" id="successMessage" style="display:none;">
                <div class="success-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <h3 class="success-title">Check Your Email</h3>
                <p class="success-text" id="sentEmailText">
                    We've sent a password reset link to <strong id="sentEmail"></strong>
                </p>
                <p class="success-note">
                    Didn't receive the email? Check your spam folder or 
                    <button class="btn-link" id="resendBtn">click here to resend</button>
                </p>
                <button class="btn btn-secondary btn-block mt-4" id="backToLoginBtn">
                    Back to Login
                </button>
            </div>

            <!-- Help Section -->
            <div class="auth-help">
                <p>Need help? <a href="#/settings" class="auth-link">Contact Support</a></p>
            </div>
        </div>
    </div>
</div>
