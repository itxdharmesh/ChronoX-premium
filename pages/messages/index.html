<!DOCTYPE html>
<!-- ChronoX - Messages Page -->
<div class="messages-page">
    <div class="messages-container">
        <!-- Conversations List -->
        <div class="conversations-panel glass">
            <div class="conversations-header">
                <h3>Messages</h3>
                <button class="btn btn-primary btn-sm" id="newChatBtn">New Chat</button>
            </div>
            <div class="conversations-search">
                <input type="text" class="form-input" id="conversationSearch" placeholder="Search conversations...">
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>
        <!-- Chat Area -->
        <div class="chat-panel glass" id="chatPanel">
            <div class="chat-placeholder">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p>Select a conversation</p>
            </div>
            <div class="chat-active" id="chatActive" style="display:none;">
                <div class="chat-header">
                    <img src="assets/avatars/default.png" class="avatar avatar-sm" id="chatAvatar">
                    <div>
                        <div class="font-semibold text-sm" id="chatName">User</div>
                        <div class="text-xs text-muted">Online</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" class="form-input" id="chatInput" placeholder="Type a message...">
                    <button class="btn btn-primary btn-sm" id="sendMsgBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>
