<!DOCTYPE html>
<!-- ChronoX - Friends Page -->
<div class="friends-page">
    <div class="friends-header">
        <h2>Friends</h2>
        <div class="friends-tabs">
            <button class="friend-tab active" data-tab="all">All Friends</button>
            <button class="friend-tab" data-tab="requests">Requests</button>
            <button class="friend-tab" data-tab="suggestions">Suggestions</button>
        </div>
    </div>
    <div class="friends-search">
        <input type="text" class="form-input" id="friendSearchInput" placeholder="Search friends...">
    </div>
    <div class="friends-list" id="friendsList"></div>
</div>
