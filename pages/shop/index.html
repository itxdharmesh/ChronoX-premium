<!DOCTYPE html>
<!-- ChronoX - Shop Page -->
<div class="shop-page">
    <div class="shop-header">
        <h2>Shop</h2>
        <div class="shop-coins glass">
            <span>💰</span>
            <span id="shopCoinsCount">0</span>
            <span>Coins</span>
        </div>
    </div>

    <div class="shop-tabs">
        <button class="shop-tab active" data-tab="items">Avatar Items</button>
        <button class="shop-tab" data-tab="themes">Themes</button>
        <button class="shop-tab" data-tab="badges">Badges</button>
        <button class="shop-tab" data-tab="backgrounds">Backgrounds</button>
    </div>

    <div class="shop-grid" id="shopGrid"></div>
</div>
