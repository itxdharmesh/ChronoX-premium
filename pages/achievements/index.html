<!DOCTYPE html>
<!-- ChronoX - Achievements Page -->
<div class="achievements-page">
    <div class="achievements-header">
        <h2>Achievements</h2>
        <div class="achievements-progress glass">
            <span id="unlockedCount">0</span>/<span id="totalCount">0</span> Unlocked
        </div>
    </div>

    <div class="achievements-categories">
        <button class="ach-category active" data-cat="all">All</button>
        <button class="ach-category" data-cat="social">Social</button>
        <button class="ach-category" data-cat="gaming">Gaming</button>
        <button class="ach-category" data-cat="special">Special</button>
    </div>

    <div class="achievements-grid" id="achievementsGrid"></div>
</div>
