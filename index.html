<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0E27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ChronoX - Premium Social Network</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<!-- SPACE BACKGROUND -->
<div class="stars-container" id="starsContainer"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<!-- SPLASH SCREEN -->
<div id="splashScreen">
    <div class="chronox-logo">
        <div class="logo-c"></div>
        <div class="logo-dot"></div>
        <div class="logo-dot"></div>
        <div class="logo-dot"></div>
    </div>
    <div class="splash-brand">ChronoX</div>
    <p style="color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;font-size:12px">Premium Social Network</p>
    <div class="splash-loader"><div></div></div>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen"></div>

<!-- MAIN APP -->
<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Search</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>

<!-- CHAT WINDOW -->
<div id="chatWindow">
    <div id="chatHeader">
        <button onclick="closeChat()" style="background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;padding:5px">←</button>
        <img class="chat-avatar-img" id="chatAvatar" src="" style="width:40px;height:40px" onerror="this.style.display='none'">
        <div style="flex:1">
            <div style="font-weight:600" id="chatName">User</div>
            <div style="font-size:11px;color:#2ED573" id="chatStatus">● Online</div>
        </div>
    </div>
    <div id="chatMessages"></div>
    <div id="typingIndicator"></div>
    <div id="chatInput">
        <button onclick="attachMedia()" style="background:none;border:none;font-size:22px;cursor:pointer;padding:8px;flex-shrink:0">📎</button>
        <input id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()" id="sendBtn">➤</button>
    </div>
</div>

<!-- MODALS -->
<div class="modal" id="genericModal">
    <div class="modal-box" id="genericContent"></div>
</div>
<div class="modal" id="gamesModal">
    <div class="modal-box" id="gamesContent"></div>
</div>

<!-- SCRIPTS -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>
<script src="js/search.js"></script>
<script src="js/games.js"></script>
<script src="js/multiplayer.js"></script>
<script src="js/achievements.js"></script>
<script src="js/notifications.js"></script>

<!-- CREATE STARS -->
<script>
(function() {
    var container = document.getElementById('starsContainer');
    for (var i = 0; i < 100; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        var size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', Math.random() * 4 + 's');
        container.appendChild(star);
    }
})();
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
