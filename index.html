<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0E27">
    <title>ChronoX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="splashScreen">
    <div class="splash-logo">🕷️</div>
    <div class="splash-brand">ChronoX</div>
    <div class="splash-loader"><div></div></div>
</div>

<div id="authScreen"></div>

<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Search</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>

<div id="chatWindow">
    <div id="chatHeader">
        <button onclick="closeChatWindow()">←</button>
        <img id="chatAvImg" src="">
        <div><div id="chatNm"></div><div id="chatSt"></div></div>
    </div>
    <div id="chatMsgs"></div>
    <div id="chatInputArea">
        <input id="chatInput" placeholder="Type a message..." autocomplete="off">
        <button id="chatSendBtn" onclick="sendChatMessage()">➤</button>
    </div>
</div>

<div class="modal" id="genericModal"><div class="modal-box" id="genericContent"></div></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>
<script src="js/search.js"></script>

</body>
</html>
