<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChronoX - Social Gaming Platform. Connect with friends, join communities, play games and earn rewards.">
    <meta name="keywords" content="social, gaming, community, rewards, xp, achievements, friends, chat">
    <meta name="author" content="ChronoX">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChronoX">
    
    <!-- Open Graph -->
    <meta property="og:title" content="ChronoX - Social Gaming Platform">
    <meta property="og:description" content="Connect, play, and earn rewards">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chronox.app">
    <meta property="og:image" content="assets/images/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ChronoX - Social Gaming Platform">
    <meta name="twitter:description" content="Connect, play, and earn rewards">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    
    <title>ChronoX - Social Gaming Platform</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/utility.css">
    <link rel="stylesheet" href="components/navbar/navbar.css">
    <link rel="stylesheet" href="components/sidebar/sidebar.css">
    <link rel="stylesheet" href="components/footer/footer.css">
    <link rel="stylesheet" href="components/loader/loader.css">
    <link rel="stylesheet" href="components/toast/toast.css">
    <link rel="stylesheet" href="components/modal/modal.css">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- Navbar -->
        <header id="navbar-container"></header>
        
        <!-- Sidebar -->
        <aside id="sidebar-container"></aside>
        
        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <div id="page-loader" class="page-loader">
                <div class="loader-spinner"></div>
            </div>
        </main>
        
        <!-- Footer -->
        <footer id="footer-container"></footer>
        
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal Container -->
    <div id="modal-container" class="modal-container"></div>
    
    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Component JavaScript -->
    <script src="components/navbar/navbar.js"></script>
    <script src="components/sidebar/sidebar.js"></script>
    <script src="components/footer/footer.js"></script>
    <script src="components/loader/loader.js"></script>
    <script src="components/toast/toast.js"></script>
    <script src="components/modal/modal.js"></script>
</body>
</html>
