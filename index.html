<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0E27">
    <title>ChronoX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="splashScreen">
    <div style="font-size:80px">🕷️</div>
    <div style="font-size:38px;font-weight:900;color:#D4AF37;letter-spacing:5px;margin:15px 0;text-transform:uppercase">ChronoX</div>
    <div style="width:150px;height:3px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;margin-top:20px">
        <div style="width:40%;height:100%;background:linear-gradient(90deg,#D4AF37,#00D4FF);border-radius:10px;animation:load 1.2s infinite"></div>
    </div>
</div>

<div id="authScreen"></div>

<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Search</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>

<div class="modal" id="genericModal">
    <div class="modal-box" id="genericContent"></div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/search.js"></script>
<script src="js/profile.js"></script>
<script src="js/shop.js"></script>

<style>
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
#splashScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0A0E27;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:0.5s}
#splashScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
</style>

</body>
</html>
