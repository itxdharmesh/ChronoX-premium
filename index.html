<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0E27">
    <title>ChronoX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<div id="splashScreen">
    <div class="splash-logo">🕷️</div>
    <div class="splash-brand">ChronoX</div>
    <p style="color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;font-size:12px">Premium Social Network</p>
    <div class="splash-loader"><div></div></div>
</div>

<div id="authScreen"></div>

<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Search</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>

<div id="chatWindow">
    <div id="chatHeader">
        <button onclick="closeChat()" style="background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;padding:5px">←</button>
        <img id="chatAvatar" src="" style="width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;display:none">
        <span id="chatAvatarEmoji" style="font-size:35px;display:none"></span>
        <div style="flex:1">
            <div style="font-weight:600" id="chatName">User</div>
            <div style="font-size:11px;color:#2ED573" id="chatStatus">● Online</div>
        </div>
    </div>
    <div id="chatMessages"></div>
    <div id="typingIndicator"></div>
    <div id="chatInput">
        <button onclick="attachMedia()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:8px;flex-shrink:0">📎</button>
        <input id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()" id="sendBtn">➤</button>
    </div>
</div>

<div class="modal" id="genericModal"><div class="modal-box" id="genericContent"></div></div>
<div class="modal" id="gamesModal"><div class="modal-box" id="gamesContent"></div></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>
<script src="js/search.js"></script>
<script src="js/shop.js"></script>
<script src="js/achievements.js"></script>
<script src="js/notifications.js"></script>
<script src="js/games/games-main.js"></script>
<script src="js/games/tictactoe.js"></script>
<script src="js/games/snake.js"></script>
<script src="js/games/pong.js"></script>
<script src="js/games/flappy.js"></script>
<script src="js/games/invaders.js"></script>
<script src="js/games/breakout.js"></script>
<script src="js/games/tower.js"></script>
<script src="js/games/runner.js"></script>
<script src="js/games/memory.js"></script>
<script src="js/games/quiz.js"></script>
<script src="js/games/rps.js"></script>
<script src="js/games/number.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
