<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="splashScreen">
    <div style="font-size:80px">🕷️</div>
    <div style="font-size:38px;font-weight:900;color:#D4AF37;letter-spacing:5px;margin:15px 0">ChronoX</div>
</div>
<div id="authScreen"></div>
<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Search</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>
<div class="modal" id="genericModal"><div class="modal-box" id="genericContent"></div></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/search.js"></script>
<script src="js/profile.js"></script>
<script src="js/shop.js"></script>

<!-- SIRF GAMES HUB -->
<script src="js/games/games-main.js"></script>

<script>
var gameFiles = {
    tictactoe:'js/games/tictactoe.js',snake:'js/games/snake.js',pong:'js/games/pong.js',
    flappy:'js/games/flappy.js',invaders:'js/games/invaders.js',breakout:'js/games/breakout.js',
    tower:'js/games/tower.js',runner:'js/games/runner.js',memory:'js/games/memory.js',
    quiz:'js/games/quiz.js',rps:'js/games/rps.js',number:'js/games/number.js',
    pacman:'js/games/pacman.js',tetris:'js/games/tetris.js','2048':'js/games/2048.js',
    sudoku:'js/games/sudoku.js',wordle:'js/games/wordle.js',minesweeper:'js/games/minesweeper.js',
    connect4:'js/games/connect4.js',doodle:'js/games/doodle.js',
    slots:'js/games/slots.js',blackjack:'js/games/blackjack.js',
    bubble:'js/games/bubble.js',racing:'js/games/racing.js',ludo:'js/games/ludo.js',
    basketball:'js/games/basketball.js',football:'js/games/football.js',
    traffic:'js/games/traffic.js',match3:'js/games/match3.js',chess:'js/games/chess.js'
};
var loadedGames = {};

function loadGameScript(name, callback) {
    if (loadedGames[name]) { callback(); return; }
    var file = gameFiles[name];
    if (!file) { showToast('Game not found!','error'); return; }
    showToast('Loading...');
    var s = document.createElement('script');
    s.src = file;
    s.onload = function() { loadedGames[name] = true; callback(); };
    s.onerror = function() { showToast('Failed to load','error'); };
    document.head.appendChild(s);
}
</script>
</body>
</html>
