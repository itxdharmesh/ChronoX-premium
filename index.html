<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoX - Premium Social Network</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
        
        :root{
            --gold:#D4AF37;--gold-light:#F5E6A3;--dark:#0A0E27;
            --card:rgba(19,24,66,0.85);--border:rgba(212,175,55,0.25);
        }
        
        body{
            background:linear-gradient(135deg,#0A0E27,#131842,#1A1F4E);
            color:#fff;height:100vh;overflow:hidden;
            display:flex;align-items:center;justify-content:center;
        }
        
        /* Splash */
        #splashScreen{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:#0A0E27;display:flex;align-items:center;
            justify-content:center;flex-direction:column;z-index:9999;
            transition:0.5s;
        }
        #splashScreen.hidden{opacity:0;pointer-events:none}
        #splashScreen .logo{font-size:80px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        #splashScreen .brand{
            font-size:42px;font-weight:900;letter-spacing:5px;
            background:linear-gradient(135deg,#D4AF37,#F5E6A3);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            margin:15px 0;
        }
        .loader{
            width:160px;height:3px;background:rgba(255,255,255,0.1);
            border-radius:10px;overflow:hidden;margin-top:20px;
        }
        .loader div{
            width:40%;height:100%;background:linear-gradient(90deg,#D4AF37,#F5E6A3);
            border-radius:10px;animation:load 1.2s infinite;
        }
        @keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
        
        /* Auth */
        #authContainer{
            width:100%;height:100vh;display:flex;
            align-items:center;justify-content:center;
            background:radial-gradient(circle at center,rgba(212,175,55,0.05),transparent 70%);
        }
        .auth-box{
            width:90%;max-width:420px;
            background:rgba(19,24,66,0.9);backdrop-filter:blur(30px);
            border:1.5px solid rgba(212,175,55,0.3);border-radius:24px;
            padding:40px 30px;text-align:center;
            box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 100px rgba(212,175,55,0.05);
        }
        .auth-logo{font-size:60px;margin-bottom:10px}
        .auth-title{
            font-size:34px;font-weight:800;letter-spacing:4px;
            background:linear-gradient(135deg,#D4AF37,#F5E6A3,#D4AF37);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            text-transform:uppercase;margin-bottom:5px;
        }
        .auth-subtitle{
            font-size:12px;color:rgba(255,255,255,0.6);
            letter-spacing:2px;text-transform:uppercase;margin-bottom:25px;
        }
        .inp{
            width:100%;padding:14px 16px;margin:8px 0;
            background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);
            border-radius:12px;color:#fff;font-size:15px;outline:none;transition:0.3s;
        }
        .inp:focus{border-color:var(--gold);box-shadow:0 0 25px rgba(212,175,55,0.1)}
        .inp::placeholder{color:rgba(255,255,255,0.3)}
        .btn{
            width:100%;padding:15px;margin:12px 0;
            background:linear-gradient(135deg,#D4AF37,#F5E6A3,#D4AF37);
            color:#0A0E27;border:none;border-radius:12px;
            font-size:15px;font-weight:700;cursor:pointer;
            letter-spacing:2px;text-transform:uppercase;
            box-shadow:0 8px 30px rgba(212,175,55,0.3);transition:0.3s;
        }
        .btn:active{transform:scale(0.95)}
        .link{color:var(--gold-light);cursor:pointer;font-size:13px;margin:6px;display:inline-block}
        
        /* Main */
        #mainApp{display:none;width:100%;height:100vh;flex-direction:column}
        #mainApp.show{display:flex}
        #contentArea{flex:1;overflow-y:auto;padding:20px 15px 85px}
        
        /* Bottom Nav */
        #bottomNav{
            position:fixed;bottom:0;left:0;width:100%;
            background:rgba(10,14,39,0.97);backdrop-filter:blur(25px);
            border-top:1px solid rgba(212,175,55,0.2);
            display:flex;justify-content:space-around;
            padding:10px 5px 20px;z-index:100;
        }
        .nav-btn{
            background:none;border:none;color:rgba(255,255,255,0.5);
            display:flex;flex-direction:column;align-items:center;gap:4px;
            cursor:pointer;font-size:10px;font-weight:500;letter-spacing:1px;
            transition:0.3s;padding:5px 10px;text-transform:uppercase;
        }
        .nav-btn.active{color:var(--gold)}
        .nav-btn span:first-child{font-size:22px}
        
        /* Cards */
        .card{
            background:rgba(19,24,66,0.7);backdrop-filter:blur(20px);
            border:1px solid rgba(212,175,55,0.15);border-radius:18px;
            padding:20px;margin-bottom:15px;
        }
        
        /* Profile */
        .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:15px}
        .avatar{
            width:85px;height:85px;border-radius:50%;border:3px solid var(--gold);
            object-fit:cover;background:#1a1f4e;
        }
        .stats{display:flex;gap:20px}
        .stat{text-align:center;cursor:pointer}
        .stat-num{font-size:18px;font-weight:700;color:var(--gold);display:block}
        .stat-label{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase}
        .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:15px}
        .act-btn{
            padding:10px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(212,175,55,0.2);border-radius:10px;
            color:#fff;cursor:pointer;font-size:12px;text-align:center;
        }
        .btn-out{
            width:100%;padding:14px;margin:5px 0;
            background:transparent;border:1px solid var(--gold);
            color:var(--gold);border-radius:12px;font-size:14px;
            font-weight:600;cursor:pointer;
        }
        
        /* Chat */
        .chat-item{
            display:flex;align-items:center;padding:14px;
            background:var(--card);border:1px solid rgba(212,175,55,0.15);
            border-radius:14px;margin-bottom:8px;cursor:pointer;gap:12px;
        }
        .chat-avatar{
            width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);
            object-fit:cover;background:#1a1f4e;
        }
        
        #chatWindow{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:#0A0E27;z-index:500;display:none;flex-direction:column;
        }
        #chatWindow.show{display:flex}
        #chatHeader{
            display:flex;align-items:center;padding:15px;
            background:var(--card);border-bottom:1px solid rgba(212,175,55,0.2);gap:12px;
        }
        #chatMessages{
            flex:1;overflow-y:auto;padding:20px;
            display:flex;flex-direction:column;gap:10px;
        }
        .msg-sent{
            align-self:flex-end;background:linear-gradient(135deg,#D4AF37,#F5E6A3);
            color:#0A0E27;padding:10px 16px;border-radius:20px 20px 4px 20px;
            max-width:75%;font-size:14px;
        }
        .msg-rec{
            align-self:flex-start;background:rgba(19,24,66,0.8);
            border:1px solid rgba(255,255,255,0.1);padding:10px 16px;
            border-radius:20px 20px 20px 4px;max-width:75%;font-size:14px;
        }
        #chatInputArea{
            display:flex;padding:12px 15px;gap:10px;
            background:var(--card);border-top:1px solid rgba(212,175,55,0.2);
        }
        #msgInput{
            flex:1;padding:12px 18px;background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);border-radius:25px;
            color:#fff;outline:none;font-size:14px;
        }
        #sendBtn{
            width:45px;height:45px;background:linear-gradient(135deg,#D4AF37,#F5E6A3);
            border:none;border-radius:50%;color:#0A0E27;font-size:18px;cursor:pointer;
        }
        
        /* Modal */
        .modal{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.85);z-index:6000;
            display:none;align-items:center;justify-content:center;
        }
        .modal.show{display:flex}
        .modal-box{
            width:90%;max-width:450px;max-height:85vh;overflow-y:auto;
            background:#131842;border:1px solid rgba(212,175,55,0.2);
            border-radius:20px;padding:25px;
        }
        .modal-header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:15px;color:var(--gold);
        }
        
        /* Toast */
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%);
            background:var(--gold);color:#0A0E27;padding:12px 24px;
            border-radius:25px;z-index:9999;font-weight:600;
            font-size:13px;box-shadow:0 10px 40px rgba(212,175,55,0.4);
        }
        .toast.error{background:#FF4757;color:#fff}
        
        @media(min-width:768px){
            #contentArea{max-width:600px;margin:0 auto}
            #bottomNav{max-width:600px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}
        }
    </style>
</head>
<body>

<div id="splashScreen">
    <div class="logo">🕷️</div>
    <div class="brand">ChronoX</div>
    <div class="loader"><div></div></div>
</div>

<div id="authContainer"></div>
<div id="mainApp">
    <div id="contentArea"></div>
    <nav id="bottomNav">
        <button class="nav-btn active" data-page="home"><span>🏠</span>Home</button>
        <button class="nav-btn" data-page="chats"><span>💬</span>Chats</button>
        <button class="nav-btn" data-page="search"><span>🔍</span>Discover</button>
        <button class="nav-btn" data-page="games"><span>🎮</span>Games</button>
        <button class="nav-btn" data-page="profile"><span>👤</span>Profile</button>
    </nav>
</div>

<div id="chatWindow">
    <div id="chatHeader">
        <button onclick="closeChat()" style="background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer">←</button>
        <img class="chat-avatar" id="chatAvatar" style="width:40px;height:40px">
        <div style="flex:1"><div style="font-weight:600" id="chatName"></div><div style="font-size:11px;color:#2ED573" id="chatStatus"></div></div>
    </div>
    <div id="chatMessages"></div>
    <div id="chatInputArea">
        <input id="msgInput" placeholder="Type a message...">
        <button id="sendBtn" onclick="sendMsg()">➤</button>
    </div>
</div>

<div class="modal" id="genericModal">
    <div class="modal-box" id="genericContent"></div>
</div>

<div class="modal" id="gamesModal">
    <div class="modal-box" id="gamesContent"></div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
