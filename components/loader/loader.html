<!-- ChronoX - Loader Component -->
<div class="loader-overlay" id="globalLoader" style="display:none;">
    <div class="loader-container glass">
        <!-- Animated Logo -->
        <div class="loader-logo">
            <svg width="64" height="64" viewBox="0 0 64 64" class="loader-logo-animation">
                <defs>
                    <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#6c5ce7"/>
                        <stop offset="100%" style="stop-color:#a55eea"/>
                    </linearGradient>
                </defs>
                <circle cx="32" cy="32" r="28" fill="none" stroke="url(#loaderGrad)" stroke-width="3" opacity="0.3"/>
                <circle cx="32" cy="32" r="28" fill="none" stroke="url(#loaderGrad)" stroke-width="3" 
                        stroke-dasharray="176" stroke-dashoffset="176" class="loader-circle"/>
                <polygon points="32,12 42,30 22,30" fill="url(#loaderGrad)" class="loader-triangle"/>
            </svg>
        </div>

        <!-- Loading Text -->
        <div class="loader-text">
            <h3 class="loader-title">Chrono<span class="text-primary">X</span></h3>
            <p class="loader-message" id="loaderMessage">Loading...</p>
        </div>

        <!-- Progress Bar -->
        <div class="loader-progress-container">
            <div class="loader-progress-bar" id="loaderProgressBar"></div>
        </div>

        <!-- Loading Dots -->
        <div class="loader-dots">
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
        </div>
    </div>
</div>

<!-- Skeleton Loader Template -->
<template id="skeletonCard">
    <div class="skeleton-card card">
        <div class="skeleton-header">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-text-group">
                <div class="skeleton-text skeleton-text-sm"></div>
                <div class="skeleton-text skeleton-text-xs"></div>
            </div>
        </div>
        <div class="skeleton-body">
            <div class="skeleton-text skeleton-text-lg"></div>
            <div class="skeleton-text skeleton-text-md"></div>
            <div class="skeleton-text skeleton-text-sm"></div>
        </div>
        <div class="skeleton-image"></div>
        <div class="skeleton-footer">
            <div class="skeleton-button"></div>
            <div class="skeleton-button"></div>
            <div class="skeleton-button"></div>
        </div>
    </div>
</template>

<template id="skeletonProfile">
    <div class="skeleton-profile">
        <div class="skeleton-banner"></div>
        <div class="skeleton-avatar-lg"></div>
        <div class="skeleton-text skeleton-text-xl skeleton-center"></div>
        <div class="skeleton-text skeleton-text-sm skeleton-center"></div>
        <div class="skeleton-stats">
            <div class="skeleton-stat"></div>
            <div class="skeleton-stat"></div>
            <div class="skeleton-stat"></div>
        </div>
    </div>
</template>

<template id="skeletonList">
    <div class="skeleton-list-item">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-text-group">
            <div class="skeleton-text skeleton-text-sm"></div>
            <div class="skeleton-text skeleton-text-xs"></div>
        </div>
    </div>
</template>
