<!-- ChronoX - Modal Component -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-container glass" id="modalContainer" role="dialog" aria-modal="true">
        <!-- Modal Header -->
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Modal Title</h3>
            <button class="modal-close" id="modalClose" aria-label="Close modal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        
        <!-- Modal Body -->
        <div class="modal-body" id="modalBody">
            <!-- Dynamic content goes here -->
        </div>
        
        <!-- Modal Footer -->
        <div class="modal-footer" id="modalFooter" style="display:none;">
            <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
            <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
        </div>
    </div>
</div>

<!-- Confirm Dialog Template -->
<template id="confirmTemplate">
    <div class="modal-confirm">
        <div class="modal-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
            </svg>
        </div>
        <p class="modal-message"></p>
    </div>
</template>

<!-- Alert Dialog Template -->
<template id="alertTemplate">
    <div class="modal-alert">
        <div class="modal-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <p class="modal-message"></p>
    </div>
</template>

<!-- Image Preview Template -->
<template id="imagePreviewTemplate">
    <div class="modal-image-preview">
        <img src="" alt="Preview" class="modal-preview-image" id="modalPreviewImage">
        <div class="modal-image-actions">
            <button class="btn btn-secondary btn-sm" id="modalZoomIn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="11" y1="8" x2="11" y2="14"/>
                    <line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
                Zoom
            </button>
            <button class="btn btn-secondary btn-sm" id="modalDownload">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download
            </button>
        </div>
    </div>
</template>
